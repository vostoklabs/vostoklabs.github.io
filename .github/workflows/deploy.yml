name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Hub
        run: pnpm build:hub

      - name: Build Name Keychain
        run: pnpm build:keychain

      - name: Copy Name Keychain to Hub Dist
        run: cp -r apps/name-keychain/dist apps/hub/dist/name-keychain

      - name: Build Clicker Generator
        run: pnpm build:clicker

      - name: Copy Clicker Generator to Hub Dist
        run: |
          cp -r apps/clicker-generator/dist apps/hub/dist/Clicker-Generator
          cp -r apps/clicker-generator/dist apps/hub/dist/clicker

      - name: Build Keycap Generator
        run: pnpm build:keycap

      - name: Copy Keycap Generator to Hub Dist
        run: |
          cp -r apps/keycap-generator/dist apps/hub/dist/SVG-keycap-generator
          cp -r apps/keycap-generator/dist apps/hub/dist/keycap

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/hub/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
