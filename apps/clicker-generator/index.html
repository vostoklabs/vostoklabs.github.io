<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clicker Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Favicon: black logo (dark ink) reads on light backgrounds; white logo on dark. -->
    <link rel="icon" type="image/png" href="./assets/favicon/Vostokfaviconblack.png" />
    <link rel="icon" type="image/png" href="./assets/favicon/vostokfaviconwhite.png" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="./assets/favicon/Vostokfaviconblack.png" />
    <script>
      (function() {
        const saved = localStorage.getItem('clicker_theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = saved || (systemDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <header id="topbar"></header>
    <main class="vl-app">
      <aside id="sidebar-left" class="vl-panel vl-panel--left vl-panel__scroll"></aside>
      <div id="viewport" class="vl-stage">
        <p class="vl-stage__label">Live 3D Preview</p>
        <div id="app"></div>
        <div id="status">Booting…</div>
        <p id="hint" class="vl-stage__hint">Hold left click to rotate, right click to pan, scroll to zoom.</p>
      </div>
      <aside id="sidebar-right" class="vl-panel vl-panel--right"></aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
